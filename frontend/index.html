<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graydient Prompt Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">Graydient Prompt Generator</h1>
            <p class="subtitle">Transform your ideas into stunning images</p>
        </header>

        <main class="main-content">
            <div class="input-section">
                <div class="input-group">
                    <textarea 
                        id="promptInput" 
                        placeholder="Describe the image you want to generate..."
                        rows="3"
                        maxlength="500"
                    ></textarea>
                    <div class="char-counter">
                        <span id="charCount">0</span>/500
                    </div>
                </div>
                
                <button id="generateBtn" class="generate-btn" type="button">
                    <span class="btn-text">Generate Image</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </div>

            <div class="result-section">
                <div id="imageContainer" class="image-container">
                    <div class="placeholder">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21,15 16,10 5,21"/>
                        </svg>
                        <p>Your generated image will appear here</p>
                    </div>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                    <span id="errorText"></span>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2025 Graydient. Powered by AI image generation.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
